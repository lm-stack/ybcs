name: Security audit

on:
  schedule:
    - cron: "0 8 * * 1" # Chaque lundi à 8h UTC
  workflow_dispatch: # Lancement manuel

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high
