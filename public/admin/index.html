<!DOCTYPE html>
<html data-color-mode="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Content Manager</title>
  <!-- Widget "Besoin d'aide ?" — Personnaliser les infos ci-dessous -->
  <style>
    .lm-help-fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 99999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--help-color, #FFD838);
      color: #191919;
      border: none;
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .lm-help-fab:hover { transform: scale(1.08); opacity: 0.9; }
    .lm-help-popup {
      position: fixed;
      bottom: 76px;
      right: 20px;
      z-index: 99999;
      width: 280px;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .lm-help-popup.open { display: block; }
    .lm-help-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .lm-help-logo {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .lm-help-logo img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .lm-help-brand {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0e0;
    }
    .lm-help-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
    }
    .lm-help-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .lm-help-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: var(--help-color, #FFD838);
    }
    .lm-help-item a, .lm-help-item span {
      font-size: 13px;
      color: #b0b0b0;
      text-decoration: none;
    }
    .lm-help-item a:hover { color: #fff; }
  </style>
</head>
<body>
  <!-- Sveltia CMS — version épinglée pour éviter les attaques supply-chain.
       Pour mettre à jour : npm view @sveltia/cms version, puis modifier l'URL ci-dessous. -->
  <script data-cfasync="false" src="https://unpkg.com/@sveltia/cms@0.149.0/dist/sveltia-cms.js"></script>

    - Logo : remplacer "LM" par les initiales ou une image

    - Email : remplacer hello@lausanne.marketing
    - URL : remplacer lausanne.marketing
    - Couleur : modifier la variable --help-color dans le <style>

  </div>

  <script>
    document.addEventListener('click', function(e) {
      var popup = document.querySelector('.lm-help-popup');
      var fab = document.querySelector('.lm-help-fab');
      if (popup && fab && !popup.contains(e.target) && !fab.contains(e.target)) {
        popup.classList.remove('open');
      }
    });
  </script>
</body>
</html>
