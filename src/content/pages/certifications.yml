intro:
  title: "Nos certifications"
  description: "Notre engagement envers l'excellence est attesté par nos certifications. Convaincus que la formation continue est la clé de la réussite, nous nous investissons pour maintenir notre niveau d'expertise au sommet."

focus:
  - "Gestion des risques"
  - "Protection des données"
  - "Sécurité de l'information"

certifications:
  - title: "ISO 27001 — Lead Implementer"
    category: "Sécurité de l'information"
    description: "La certification ISO 27001 Lead Implementer démontre la capacité à mettre en œuvre et à gérer un système de management de la sécurité de l'information (SMSI). Cette certification permet à nos clients de bénéficier d'une expertise approfondie dans la mise en place de cadres sécurisés."
    image: "/images/certifications/iso-27001.png"
  - title: "ISO 27005 — Risk Manager"
    category: "Gestion des risques"
    description: "Cette certification atteste de notre expertise dans l'identification, l'évaluation et le traitement des risques liés à la sécurité de l'information."
    image: "/images/certifications/iso-27005.png"
  - title: "ISO 27701 — Lead Implementer"
    category: "Protection des données"
    description: "La certification ISO 27701 Lead Implementer valide notre capacité à implémenter un système de management de la protection de la vie privée."
    image: "/images/certifications/iso-27701.png"
  - title: "CIPP/E — Certified Information Privacy Professional"
    category: "Protection des données"
    description: "Certification internationale attestant d'une expertise approfondie en matière de protection des données personnelles dans le contexte européen."
    image: "/images/certifications/cipp-e.png"
  - title: "CIPM — Certified Information Privacy Manager"
    category: "Protection des données"
    description: "Cette certification valide notre capacité à créer et gérer des programmes de protection des données au sein des organisations."
    image: "/images/certifications/cipm.png"
